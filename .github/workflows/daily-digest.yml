name: Daily Portfolio Digeston:  schedule:    - cron: '0 21 * * 1-5'→ Runs at 13:00, Monday through Friday  workflow_dispatch:jobs:  digest:    runs-on: ubuntu-latest    steps:      - uses: actions/checkout@v3      - uses: actions/setup-python@v4        with:          python-version: '3.11'      - run: pip install anthropic      - name: Run digest        env:          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}        run: python digest.py
